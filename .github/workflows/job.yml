name: Reusable job

on:
  workflow_call:
    # inputs:
    #   environment-name:
    #     required: false
    #     type: string
    #     default: github-pages # only this one in use rn

# TODO: decompose to "build" and "deploy" steps
jobs:
  deploy:
    # do not deploy if [skip-ci] is in a commit message
    if: |
      !contains(github.event.head_commit.message, '[skip-ci]')
    runs-on: ubuntu-22.04

    permissions:
      contents: write
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '25.2.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Enforce npm version 8.3.0
        run: |
          npm install -g npm@8.3.0
          echo "Updated npm version: $(npm --version)"
    
      # react-snap has build-in "npm сi" and "npm run build"
      - name: Server-side render by crawler
        uses: brycedorn/react-snap-action@v1.0.2

      - name: Copy HTML gallery
        run: npm run build:html-gallery 

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws --endpoint-url=https://storage.yandexcloud.net \
          s3 sync ./dist/ s3://shapkarin.me/ \
          --delete

      - run: printf Deployed!

