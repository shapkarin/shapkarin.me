name: Reusable job

on:
  workflow_call:
    # inputs:
    #   environment-name:
    #     required: false
    #     type: string
    #     default: github-pages # only this one in use rn

# TODO: decompose to "build" and "deploy" steps
jobs:
  deploy:
    # do not deploy if [skip-ci] is in a commit message
    if: |
      !contains(github.event.head_commit.message, '[skip-ci]')
    runs-on: ubuntu-22.04

    permissions:
      contents: write
    
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run Socket Security
        uses: SocketDev/action@ba6de6cc0565af1f42295590380973573297e31f
        env:
          # REQUIRED: API key to link scans to your dashboard and avoid CI rate limits
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '25.2.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Enforce npm version 8.3.0
        run: |
          npm install -g npm@8.3.0
          echo "Updated npm version: $(npm --version)"

      - name: Install Socket Security CLI
        # This globally installs the 'sfw' binary on the runner
        run: npm install -g @socketsecurity/cli
    
      - name: Install Dependencies Securely
        # Using the Socket Firewall to intercept the installation
        run: sfw npm ci

      - name: Server-side render by crawler
        # Replaced the black-box action with explicit, Native commands
        # Assumes 'react-snap' is in your package.json or available via npx
        run: |
          npm run build
          npx react-snap

      - name: Copy HTML gallery
        run: npm run build:html-gallery 

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: ${{ github.event_name == 'schedule' && 'autodeploy commit' || github.event.head_commit.message }}
        
      - run: printf "Deployed!"